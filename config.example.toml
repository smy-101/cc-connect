# cc-connect 配置文件示例
# 复制此文件为 config.toml 并根据需要修改

# 应用级配置
log_level = "info"              # 日志级别: debug, info, warn, error
default_project = "my-project"  # 默认项目名称

# 项目配置列表
[[projects]]
name = "my-project"
description = "我的项目"
working_dir = "/home/user/workspace/my-project"

# 飞书平台配置
[projects.feishu]
app_id = "${FEISHU_APP_ID}"       # 建议使用环境变量
app_secret = "${FEISHU_APP_SECRET}" # 建议使用环境变量
enabled = true

# Claude Code 代理配置
[projects.claude_code]
default_permission_mode = "default" # default, edit, acceptEdits, plan, yolo, bypassPermissions
enabled = true

# 可选：会话配置覆盖（不设置则使用默认值）
# [projects.session]
# active_ttl = "30m"         # 活跃会话超时，默认 30 分钟
# archived_ttl = "24h"       # 归档会话超时，默认 24 小时
# cleanup_interval = "5m"    # 清理间隔，默认 5 分钟

# 多项目配置示例
# [[projects]]
# name = "another-project"
# description = "另一个项目"
# working_dir = "/home/user/workspace/another-project"
#
# [projects.feishu]
# app_id = "cli_another_app_id"
# app_secret = "another_secret"
# enabled = true
#
# [projects.claude_code]
# default_permission_mode = "plan"
# enabled = true
