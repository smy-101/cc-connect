schema: spec-driven

context: |
  项目名称: cc-connect
  项目目标: 使用 Go 语言重写 cc-connect，提供 TUI（终端用户界面），通过聊天平台控制本地 AI 代理。

  当前阶段定位:
  - 这是一个从零开始的 Go 项目，当前仓库非常轻量，已有 go.mod 和实现方案文档。
  - OpenSpec 应作为后续需求、设计、任务拆解和验收的主入口。
  - 当前第一优先级不是覆盖原版全部能力，而是先做可验证的最小可用版本。

  初始范围（MVP）:
  - 平台只要求优先支持飞书。
  - AI 代理只要求优先支持 Claude Code。
  - 核心能力包括统一消息结构、消息路由、会话管理、配置管理、斜杠命令、基础 TUI。
  - 高级能力如多项目管理、多机器人中继、语音消息、完整定时任务系统属于后续阶段，除非变更明确要求提前实现。

  技术栈与实现约束:
  - 语言与版本: Go 1.25.x。
  - 代码组织优先使用标准 Go 项目布局，建议围绕 internal/core、internal/platform、internal/agent、internal/tui、test/e2e 演进。
  - TUI 设计默认面向终端交互，若引入外部库，应优先选择 Go 社区主流且易测试的方案。
  - 对外部平台、WebSocket、子进程、定时任务等能力必须支持可替换的 mock 或测试桩，避免测试强依赖真实网络和真实公网环境。
  - 配置、适配器、命令处理、会话管理都应支持单元测试和集成测试。

  核心领域要求:
  - 统一消息模型必须支持 text、voice、image、command 四类消息。
  - 消息序列化在需要兼容原版生态时，应兼容 Python 版既有字段语义，例如 id、platform、user_id、content、type、timestamp。
  - 飞书接入优先使用无需公网 IP 的 WebSocket 方式，并覆盖心跳、重连、事件处理、@ 提及解析。
  - Claude Code 适配器需要支持权限模式切换，并覆盖 default、edit、plan、yolo 等常用模式及别名映射。
  - 斜杠命令至少覆盖 /mode、/new、/list、/help、/allow、/stop、/provider、/cron。
  - 命令、平台事件和代理输出必须统一进入消息路由和会话体系，而不是各自维护孤立逻辑。

  研发流程:
  - 严格采用 TDD，遵循 red-green-refactor 循环。
  - 每个功能变更优先先补测试，再做最小实现，最后再重构。
  - 需求拆解优先按垂直能力切片，不要只做大而全的基础设施搭建。
  - 若功能涉及 IO、并发、重试、取消、超时，设计中必须明确状态流转与错误处理。

  分阶段路线图:
  - 阶段 1: 核心消息系统，覆盖统一消息结构、消息路由、会话管理、配置管理。
  - 阶段 2: 飞书平台适配器，覆盖 WebSocket 连接、消息收发、事件处理、卡片消息能力预留。
  - 阶段 3: Claude Code 适配器，覆盖子进程管理、流式输出解析、工具调用处理、权限模式切换。
  - 阶段 4: 斜杠命令系统，覆盖模式切换、会话管理、提供商管理、定时任务命令。
  - 阶段 5: TUI 界面，覆盖消息监控、会话管理、项目配置、日志/状态查看。
  - 阶段 6: 高级功能，覆盖多项目管理、多机器人中继、语音消息、完整定时任务。

  质量门槛与验收要求:
  - 核心功能测试覆盖率目标大于 85%，阶段性最低不低于 80%。
  - 飞书适配器需具备稳定性验证，包括断线重连、心跳、事件解析等集成测试。
  - Claude Code 集成需覆盖完整 AI 交互流程，至少具备端到端主链路测试。
  - 命令响应应有明确的验收标准，目标是用户可感知延迟低、行为可预测、错误信息清晰。
  - 任何新增功能都应定义正常路径、错误路径和边界路径的验收场景。

  架构偏好:
  - 优先选择简单、可测试、可替换的接口设计，避免过度抽象。
  - 新增第三方依赖必须有明确收益，不为“未来可能需要”预先建复杂框架。
  - 领域模型、适配器、UI、基础设施边界要清晰，避免平台逻辑泄漏进核心域模型。

  文档与语言约定:
  - OpenSpec 产物默认使用中文撰写。
  - 命令名、代码标识符、协议字段、模式名保持原始英文大小写。
  - 描述需求时要区分“当前必须实现”和“后续阶段规划”，避免把路线图误写成当前承诺。
  - docs/Go 语言 TDD 实现 cc-connect 完整方案（含功能详解）.md 是当前项目范围和阶段规划的重要输入来源。

rules:
  proposal:
    - 使用中文撰写，并明确说明本次变更属于哪个阶段或是否提前实现后续阶段能力。
    - 必须包含以下部分：背景、目标、范围、非目标、影响模块、验收标准、风险与缓解。
    - 如果变更超出 Feishu + Claude Code 的 MVP 范围，必须解释业务价值和优先级理由。
    - 提案应说明受影响的能力域，例如 core、platform/feishu、agent/claudecode、command、tui、advanced。
    - 提案中的验收标准必须可测试，不能只有抽象表述。
  design:
    - 使用中文撰写，并给出清晰的包划分、接口边界、状态流转和错误处理策略。
    - 涉及 WebSocket、子进程、调度器、并发消息处理时，必须说明超时、取消、重试、资源回收和可测试性。
    - 需要明确哪些部分属于核心域，哪些属于平台适配层、代理适配层、TUI 层或基础设施层。
    - 如果引入第三方库，必须说明选择原因、替代方案和测试策略。
    - 设计必须覆盖兼容性要求，例如消息格式兼容、命令行为兼容或模式别名兼容。
  tasks:
    - 使用中文撰写，并按可落地的小任务拆分，单个任务应尽量控制在半天到一天内完成。
    - 默认顺序应体现 TDD：先写失败测试，再补最小实现，最后做必要重构与文档更新。
    - 任务应显式标注影响目录或模块，并在适合时给出验证方式，例如 go test 命令或验收场景。
    - 任务拆分应优先形成可演示的垂直切片，不要先堆积大量不可验证的基础代码。
    - 若任务之间存在依赖或可并行关系，需要写清楚。
  spec:
    - 使用中文撰写，需求语句优先使用 MUST、SHOULD、MAY 等明确约束词。
    - 每组需求至少包含一个正常场景，必要时补充错误场景、边界场景和恢复场景。
    - 命令系统相关规范必须说明输入格式、状态变化、用户可见反馈和错误反馈。
    - 平台或代理适配相关规范必须说明连接生命周期、异常恢复、消息转换和权限行为。
    - 规格关注外部可观察行为，避免写成纯实现说明。
